name: Build and Deploy FitNest Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'simple-k8s-app/frontend/**' 
permissions:
  contents: write
env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: fitnest-frontend
  ECR_REGISTRY: 957563772273.dkr.ecr.us-east-1.amazonaws.com 

jobs:
  build-and-update-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag, and push image to Amazon ECR
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Updated: Move into the exact frontend directory before building
          cd simple-k8s-app/frontend
          docker build -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG .
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG

      - name: Update Kubernetes YAML with new image tag
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Updated: Target the exact k8s file path
          sed -i "s|image: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:.*|image: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG|g" k8s/frontend/frontend-deployment.yaml

      - name: Commit and push changes to trigger ArgoCD
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          # Updated: Stage the exact k8s file path
          git add k8s/frontend/frontend-deployment.yaml
          git commit -m "ci: update frontend image tag to ${{ github.sha }}"
          git push