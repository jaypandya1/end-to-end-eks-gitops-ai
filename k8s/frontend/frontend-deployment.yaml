apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
  spec:
    containers:
      - name: frontend
        image: 957563772273.dkr.ecr.us-east-1.amazonaws.com/fitnest-frontend:latest
        ports:
        - containerPort: 80