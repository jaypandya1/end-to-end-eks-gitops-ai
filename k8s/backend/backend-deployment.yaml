apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: fitnest
spec:
  replicas: 2 
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: 957563772273.dkr.ecr.us-east-1.amazonaws.com/fitnest-backend:latest
          ports:
          - containerPort: 3001
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          env:
        - name: PORT
          value: "3001"
        - name: DB_USER
          value: "postgres"
        - name: DB_NAME
          value: "FitNest"
        - name: DB_HOST
          value: "db"
      
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: fitnest-secrets
              key: db-password
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: fitnest-secrets
              key: jwt-secret