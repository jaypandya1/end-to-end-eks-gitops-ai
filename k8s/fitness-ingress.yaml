apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fitnest-ingress
  namespace: fitnest
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:957563772273:certificate/e5c201a8-81fe-4269-afd3-db428cc744da 
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
spec:
  rules:
  - host: jaypandya.systems
    http:
      paths:
      # 1. Send all /api traffic directly to the Backend
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port: 
              number: 3001
    
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port: 
              number: 80
  - host: www.jaypandya.systems
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 3001
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80