apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fitnest-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/jaypandya1/end-to-end-eks-gitops-ai.git'
    path: k8s
    targetRevision: HEAD
    directory:
      recurse: true
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true